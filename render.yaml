services:
  - type: web
    name: supermart-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: supermart-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: POS_API_KEY
        generateValue: true
      - key: SMS_PROVIDER
        value: mock
      - key: FREE_DELIVERY_THRESHOLD
        value: "500"
      - key: DELIVERY_FEE
        value: "40"
      - key: STORE_LAT
        value: "21.2094"
      - key: STORE_LNG
        value: "72.8261"
      - key: DELIVERY_RADIUS_KM
        value: "4"
      - key: STORE_ADDRESS
        value: "Kapodra, Surat, Gujarat"

databases:
  - name: supermart-db
    region: singapore
    plan: free
